<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>image gallery</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    color: #111111;
  }

  body {
    display: flex;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }

  main {
    width: 100%;
    max-width: 720px;
    padding: 3rem 1.5rem;
  }

  h1 {
    margin: 0 0 1.5rem;
    font-size: clamp(1.25rem, 4vw, 1.75rem);
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .tabs {
    display: flex;
    gap: 1.5rem;
    border-bottom: 1px solid #eee;
    margin-bottom: 1.5rem;
  }

  .tabs a {
    display: inline-block;
    padding: 0 0 0.75rem;
    font-size: 0.95rem;
    font-weight: 700;
    color: #999;
    text-decoration: none;
    border-bottom: 2px solid transparent;
  }

  .tabs a.active {
    color: #111111;
    border-bottom-color: #111111;
  }

  .upload-label {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.65rem 1.25rem;
    border-radius: 9999px;
    background: #111111;
    color: #ffffff;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 1.5rem;
  }

  .upload-label:hover {
    background: #333333;
  }

  #gallery-input {
    display: none;
  }

  #gallery-empty {
    color: #999;
    font-size: 0.9rem;
  }

  .gallery-grid {
    column-count: 2;
    column-gap: 0.75rem;
  }

  @media (min-width: 560px) {
    .gallery-grid {
      column-count: 3;
    }
  }

  .gallery-item {
    position: relative;
    break-inside: avoid;
    margin-bottom: 0.75rem;
    border-radius: 10px;
    overflow: hidden;
    background: #f5f5f5;
  }

  .gallery-item img {
    display: block;
    width: 100%;
    height: auto;
  }

  .gallery-item button {
    position: absolute;
    top: 0.4rem;
    right: 0.4rem;
    width: 1.75rem;
    height: 1.75rem;
    border: none;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.55);
    color: #ffffff;
    font-size: 1rem;
    line-height: 1;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .gallery-item:hover button {
    opacity: 1;
  }

  .gallery-item button:hover {
    background: rgba(0, 0, 0, 0.75);
  }
</style>
</head>
<body>
  <main>
    <nav class="tabs">
      <a href="index.html">home</a>
      <a href="todo.html">to-do list</a>
      <a href="calendar.html">calendar</a>
      <a href="gallery.html" class="active">gallery</a>
    </nav>

    <h1>image gallery</h1>

    <label class="upload-label" for="gallery-input">+ add image</label>
    <input id="gallery-input" type="file" accept="image/*" multiple>

    <p id="gallery-empty">아직 추가된 이미지가 없습니다</p>
    <div class="gallery-grid" id="gallery-grid"></div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="gallery.js"></script>
  <script>
    const galleryInput = document.getElementById('gallery-input');
    const galleryGrid = document.getElementById('gallery-grid');
    const galleryEmpty = document.getElementById('gallery-empty');

    function renderGallery(images) {
      const sorted = images.slice().sort((a, b) => b.createdAt - a.createdAt);
      galleryEmpty.style.display = sorted.length ? 'none' : 'block';
      galleryGrid.innerHTML = '';

      sorted.forEach((image) => {
        const item = document.createElement('div');
        item.className = 'gallery-item';

        const img = document.createElement('img');
        img.src = image.dataUrl;
        img.alt = '';
        img.loading = 'lazy';

        const removeBtn = document.createElement('button');
        removeBtn.textContent = '×';
        removeBtn.setAttribute('aria-label', '삭제');
        removeBtn.addEventListener('click', () => removeImage(image.id));

        item.appendChild(img);
        item.appendChild(removeBtn);
        galleryGrid.appendChild(item);
      });
    }

    galleryInput.addEventListener('change', async () => {
      const files = Array.from(galleryInput.files || []);
      for (const file of files) {
        try {
          const dataUrl = await resizeImageFile(file, 1000, 0.7);
          addImage(dataUrl);
        } catch (err) {
          showGalleryError('image processing failed', err);
        }
      }
      galleryInput.value = '';
    });

    subscribeImages(renderGallery);
  </script>
</body>
</html>
