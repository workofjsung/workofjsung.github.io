<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>calendar</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    color: #111111;
  }

  body {
    display: flex;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }

  main {
    width: 100%;
    max-width: 640px;
    padding: 3rem 1.5rem;
  }

  .calendar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .calendar-header h1 {
    margin: 0;
    font-size: clamp(1.25rem, 4vw, 1.75rem);
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .calendar-header button {
    border: none;
    background: none;
    font-size: 1.25rem;
    line-height: 1;
    padding: 0.5rem 0.75rem;
    cursor: pointer;
    border-radius: 6px;
    color: #111111;
  }

  .calendar-header button:hover {
    background: #f0f0f0;
  }

  .tabs {
    display: flex;
    gap: 1.5rem;
    border-bottom: 1px solid #eee;
    margin-bottom: 1.5rem;
  }

  .tabs a {
    display: inline-block;
    padding: 0 0 0.75rem;
    font-size: 0.95rem;
    font-weight: 700;
    color: #999;
    text-decoration: none;
    border-bottom: 2px solid transparent;
  }

  .tabs a.active {
    color: #111111;
    border-bottom-color: #111111;
  }

  .weekday-row,
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }

  .weekday-row {
    border-bottom: 1px solid #eee;
    padding-bottom: 0.5rem;
    margin-bottom: 0.25rem;
  }

  .weekday-row div {
    text-align: center;
    font-size: 0.8rem;
    font-weight: 700;
    color: #999;
  }

  .calendar-grid div {
    position: relative;
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
    padding: 0.4rem;
    box-sizing: border-box;
    font-size: 0.9rem;
    border: 1px solid #f0f0f0;
    margin: -0.5px;
    cursor: pointer;
  }

  .calendar-grid div:hover {
    background: #f7f7f7;
  }

  .calendar-grid div.empty {
    color: transparent;
    border-color: transparent;
    cursor: default;
  }

  .calendar-grid div.empty:hover {
    background: none;
  }

  .calendar-grid div.holiday {
    color: #F04C4E;
  }

  .calendar-grid div.today {
    background: #e5e5e5;
    color: #111111;
    border-radius: 6px;
    font-weight: 700;
  }

  .calendar-grid div.today:hover {
    background: #e5e5e5;
  }

  .calendar-grid div .todo-dot {
    position: absolute;
    bottom: 0.35rem;
    right: 0.4rem;
    width: 0.35rem;
    height: 0.35rem;
    border-radius: 50%;
    background: #3da7de;
  }

  .calendar-grid div .todo-dot.muted {
    background: #4d4d4d;
  }

  .day-modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    z-index: 1000;
  }

  .day-modal.hidden {
    display: none;
  }

  .day-modal-content {
    background: #ffffff;
    border-radius: 12px;
    width: 100%;
    max-width: 400px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 1.5rem;
    box-sizing: border-box;
  }

  .day-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .day-modal-header h2 {
    margin: 0;
    font-size: 1.1rem;
    font-weight: 700;
  }

  .day-modal-header h2.holiday {
    color: #F04C4E;
  }

  .day-modal-header button {
    border: none;
    background: none;
    font-size: 1.25rem;
    line-height: 1;
    padding: 0.25rem 0.5rem;
    cursor: pointer;
    border-radius: 6px;
    color: #111111;
  }

  .day-modal-header button:hover {
    background: #f0f0f0;
  }

  #day-modal-list {
    list-style: none;
    margin: 0 0 1rem;
    padding: 0;
  }

  #day-modal-list li {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.6rem 0;
    border-bottom: 1px solid #eee;
  }

  #day-modal-list li input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    flex: none;
    width: 1.125rem;
    height: 1.125rem;
    margin: 0;
    cursor: pointer;
    border: 2px solid #ccc;
    border-radius: 50%;
    position: relative;
    outline: none;
  }

  #day-modal-list li input[type="checkbox"]:checked {
    background: #30b44a;
    border-color: #30b44a;
  }

  #day-modal-list li input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 42%;
    width: 0.3rem;
    height: 0.55rem;
    border: solid #ffffff;
    border-width: 0 2px 2px 0;
    transform: translate(-50%, -50%) rotate(45deg);
  }

  #day-modal-list li span {
    flex: 1;
    word-break: break-word;
  }

  #day-modal-list li span.done {
    text-decoration: line-through;
  }

  #day-modal-list li span.muted {
    color: #4d4d4d;
  }

  #day-modal-list li button {
    flex: none;
    width: 1.75rem;
    height: 1.75rem;
    border: none;
    background: none;
    color: #999;
    font-size: 1rem;
    line-height: 1;
    cursor: pointer;
    border-radius: 50%;
  }

  #day-modal-list li button:hover {
    background: #f0f0f0;
    color: #111111;
  }

  #day-modal-empty {
    color: #999;
    font-size: 0.9rem;
    margin: 0 0 1rem;
  }

  #day-modal-input {
    width: 100%;
    box-sizing: border-box;
    font-size: 1rem;
    padding: 0.75rem 1rem;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
  }

  #day-modal-input:focus {
    border-color: #111111;
  }
</style>
</head>
<body>
  <main>
    <nav class="tabs">
      <a href="index.html">home</a>
      <a href="todo.html">to-do list</a>
      <a href="calendar.html" class="active">calendar</a>
      <a href="gallery.html">gallery</a>
    </nav>

    <div class="calendar-header">
      <button id="prev-month" aria-label="이전 달">‹</button>
      <h1 id="month-label"></h1>
      <button id="next-month" aria-label="다음 달">›</button>
    </div>

    <div class="weekday-row">
      <div>SUN</div>
      <div>MON</div>
      <div>TUE</div>
      <div>WED</div>
      <div>THU</div>
      <div>FRI</div>
      <div>SAT</div>
    </div>

    <div class="calendar-grid" id="calendar-grid"></div>
  </main>

  <div class="day-modal hidden" id="day-modal">
    <div class="day-modal-content">
      <div class="day-modal-header">
        <h2 id="day-modal-date"></h2>
        <button id="day-modal-close" aria-label="닫기">×</button>
      </div>
      <p id="day-modal-empty">아직 할 일이 없습니다</p>
      <ul id="day-modal-list"></ul>
      <input id="day-modal-input" type="text" placeholder="할 일을 입력하고 Enter" autocomplete="off">
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="todos.js"></script>
  <script>
    const monthLabel = document.getElementById('month-label');
    const grid = document.getElementById('calendar-grid');
    const today = new Date();

    let viewYear = today.getFullYear();
    let viewMonth = today.getMonth();
    let todos = [];
    let openDayDate = null;

    const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'];

    const KOREAN_HOLIDAYS = {
      '2026-01-01': '신정',
      '2026-02-16': '설날 연휴',
      '2026-02-17': '설날',
      '2026-02-18': '설날 연휴',
      '2026-03-01': '삼일절',
      '2026-03-02': '대체공휴일(삼일절)',
      '2026-05-05': '어린이날',
      '2026-05-24': '부처님오신날',
      '2026-05-25': '대체공휴일(부처님오신날)',
      '2026-06-06': '현충일',
      '2026-08-15': '광복절',
      '2026-08-17': '대체공휴일(광복절)',
      '2026-09-24': '추석 연휴',
      '2026-09-25': '추석',
      '2026-09-26': '추석 연휴',
      '2026-10-03': '개천절',
      '2026-10-05': '대체공휴일(개천절)',
      '2026-10-09': '한글날',
      '2026-12-25': '성탄절'
    };

    const dayModal = document.getElementById('day-modal');
    const dayModalDate = document.getElementById('day-modal-date');
    const dayModalList = document.getElementById('day-modal-list');
    const dayModalEmpty = document.getElementById('day-modal-empty');
    const dayModalInput = document.getElementById('day-modal-input');
    const dayModalClose = document.getElementById('day-modal-close');

    function toDateString(year, month, day) {
      const mm = String(month + 1).padStart(2, '0');
      const dd = String(day).padStart(2, '0');
      return `${year}-${mm}-${dd}`;
    }

    function renderDayModalList() {
      const todayStr = toDateString(today.getFullYear(), today.getMonth(), today.getDate());
      const isPastDay = openDayDate < todayStr;

      const dayTodos = todos
        .filter((t) => t.date === openDayDate)
        .sort((a, b) => b.createdAt - a.createdAt);

      dayModalEmpty.style.display = dayTodos.length ? 'none' : 'block';
      dayModalList.innerHTML = '';

      dayTodos.forEach((todo) => {
        const li = document.createElement('li');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = todo.done;
        checkbox.setAttribute('aria-label', '완료 표시');
        checkbox.addEventListener('change', () => {
          updateTodo(todo.id, { done: checkbox.checked });
        });

        const span = document.createElement('span');
        span.textContent = todo.text;
        if (todo.done) span.classList.add('done');
        if (todo.done || isPastDay) span.classList.add('muted');

        const removeBtn = document.createElement('button');
        removeBtn.textContent = '×';
        removeBtn.setAttribute('aria-label', '삭제');
        removeBtn.addEventListener('click', () => removeTodo(todo.id));

        li.appendChild(checkbox);
        li.appendChild(span);
        li.appendChild(removeBtn);
        dayModalList.appendChild(li);
      });
    }

    function openDayModal(dateString) {
      openDayDate = dateString;

      const holidayName = KOREAN_HOLIDAYS[dateString];
      dayModalDate.textContent = holidayName || dateString;
      dayModalDate.classList.toggle('holiday', Boolean(holidayName));

      dayModalInput.value = '';
      renderDayModalList();
      dayModal.classList.remove('hidden');
      dayModalInput.focus();
    }

    function closeDayModal() {
      openDayDate = null;
      dayModal.classList.add('hidden');
    }

    function handleDayClick(dateString) {
      openDayModal(dateString);
    }

    dayModalClose.addEventListener('click', closeDayModal);
    dayModal.addEventListener('click', (e) => {
      if (e.target === dayModal) closeDayModal();
    });

    dayModalInput.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const text = dayModalInput.value.trim();
      if (!text) return;
      addTodo(text, openDayDate);
      dayModalInput.value = '';
    });

    function render() {
      monthLabel.textContent = `${monthNames[viewMonth]} ${viewYear}`;
      grid.innerHTML = '';

      const todayStr = toDateString(today.getFullYear(), today.getMonth(), today.getDate());
      const firstWeekday = new Date(viewYear, viewMonth, 1).getDay();
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

      for (let i = 0; i < firstWeekday; i++) {
        const cell = document.createElement('div');
        cell.className = 'empty';
        grid.appendChild(cell);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const cell = document.createElement('div');
        cell.textContent = day;
        if (viewYear === today.getFullYear() && viewMonth === today.getMonth() && day === today.getDate()) {
          cell.classList.add('today');
        }

        const dateString = toDateString(viewYear, viewMonth, day);

        if (KOREAN_HOLIDAYS[dateString]) {
          cell.classList.add('holiday');
          cell.title = KOREAN_HOLIDAYS[dateString];
        }

        const dayTodos = todos.filter((t) => t.date === dateString);
        if (dayTodos.length) {
          const isPast = dateString < todayStr;
          const allDone = dayTodos.every((t) => t.done);
          const dot = document.createElement('span');
          dot.className = 'todo-dot' + (isPast || allDone ? ' muted' : '');
          cell.appendChild(dot);
        }

        cell.addEventListener('click', () => handleDayClick(dateString));
        grid.appendChild(cell);
      }
    }

    document.getElementById('prev-month').addEventListener('click', () => {
      viewMonth -= 1;
      if (viewMonth < 0) {
        viewMonth = 11;
        viewYear -= 1;
      }
      render();
    });

    document.getElementById('next-month').addEventListener('click', () => {
      viewMonth += 1;
      if (viewMonth > 11) {
        viewMonth = 0;
        viewYear += 1;
      }
      render();
    });

    render();

    subscribeTodos((updatedTodos) => {
      todos = updatedTodos;
      render();
      if (openDayDate) renderDayModalList();
    });
  </script>
</body>
</html>
