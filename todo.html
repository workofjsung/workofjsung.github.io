<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>to-do list</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    color: #111111;
  }

  body {
    display: flex;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }

  main {
    width: 100%;
    max-width: 480px;
    padding: 3rem 1.5rem;
  }

  h1 {
    margin: 0 0 1.5rem;
    font-size: clamp(1.25rem, 4vw, 1.75rem);
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .tabs {
    display: flex;
    gap: 1.5rem;
    border-bottom: 1px solid #eee;
    margin-bottom: 1.5rem;
  }

  .tabs a {
    display: inline-block;
    padding: 0 0 0.75rem;
    font-size: 0.95rem;
    font-weight: 700;
    color: #999;
    text-decoration: none;
    border-bottom: 2px solid transparent;
  }

  .tabs a.active {
    color: #111111;
    border-bottom-color: #111111;
  }

  #todo-input {
    width: 100%;
    box-sizing: border-box;
    font-size: 1rem;
    padding: 0.75rem 1rem;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
  }

  #todo-input:focus {
    border-color: #111111;
  }

  #todo-list {
    list-style: none;
    margin: 1.5rem 0 0;
    padding: 0;
  }

  #todo-list li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
    padding: 0.75rem 0;
    border-bottom: 1px solid #eee;
  }

  #todo-list li input[type="checkbox"] {
    flex: none;
    width: 1.125rem;
    height: 1.125rem;
    margin: 0;
    cursor: pointer;
  }

  #todo-list li span {
    flex: 1;
    word-break: break-word;
  }

  #todo-list li span.done {
    text-decoration: line-through;
    color: #999;
  }

  #todo-list li .todo-date {
    flex: none;
    font-size: 0.75rem;
    color: #999;
  }

  #todo-list li button {
    flex: none;
    width: 1.75rem;
    height: 1.75rem;
    border: none;
    background: none;
    color: #999;
    font-size: 1rem;
    line-height: 1;
    cursor: pointer;
    border-radius: 50%;
  }

  #todo-list li button:hover {
    background: #f0f0f0;
    color: #111111;
  }
</style>
</head>
<body>
  <main>
    <nav class="tabs">
      <a href="todo.html" class="active">to-do list</a>
      <a href="calendar.html">calendar</a>
    </nav>

    <h1>to-do list</h1>

    <input id="todo-input" type="text" placeholder="할 일을 입력하고 Enter" autocomplete="off">
    <ul id="todo-list"></ul>
  </main>

  <script src="todos.js"></script>
  <script>
    const input = document.getElementById('todo-input');
    const list = document.getElementById('todo-list');

    function renderTodos() {
      const todos = getTodos().slice().sort((a, b) => b.id - a.id);
      list.innerHTML = '';

      todos.forEach((todo) => {
        const li = document.createElement('li');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = todo.done;
        checkbox.setAttribute('aria-label', '완료 표시');
        checkbox.addEventListener('change', () => {
          const all = getTodos();
          const target = all.find((t) => t.id === todo.id);
          if (target) target.done = checkbox.checked;
          saveTodos(all);
          span.classList.toggle('done', checkbox.checked);
        });

        const span = document.createElement('span');
        span.textContent = todo.text;
        if (todo.done) span.classList.add('done');

        const removeBtn = document.createElement('button');
        removeBtn.textContent = '×';
        removeBtn.setAttribute('aria-label', '삭제');
        removeBtn.addEventListener('click', () => {
          saveTodos(getTodos().filter((t) => t.id !== todo.id));
          renderTodos();
        });

        li.appendChild(checkbox);
        li.appendChild(span);

        if (todo.date) {
          const dateTag = document.createElement('span');
          dateTag.className = 'todo-date';
          dateTag.textContent = todo.date;
          li.appendChild(dateTag);
        }

        li.appendChild(removeBtn);
        list.appendChild(li);
      });
    }

    input.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const text = input.value.trim();
      if (!text) return;
      addTodo(text, null);
      input.value = '';
      renderTodos();
    });

    renderTodos();
  </script>
</body>
</html>
