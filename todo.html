<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work of J Sung Todo List</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    color: #111111;
  }

  body {
    display: flex;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }

  main {
    width: 100%;
    max-width: 480px;
    padding: 3rem 1.5rem;
  }

  h1 {
    margin: 0 0 1.5rem;
    font-size: clamp(1.25rem, 4vw, 1.75rem);
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  #todo-input {
    width: 100%;
    box-sizing: border-box;
    font-size: 1rem;
    padding: 0.75rem 1rem;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
  }

  #todo-input:focus {
    border-color: #111111;
  }

  #todo-list {
    list-style: none;
    margin: 1.5rem 0 0;
    padding: 0;
  }

  #todo-list li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
    padding: 0.75rem 0;
    border-bottom: 1px solid #eee;
  }

  #todo-list li input[type="checkbox"] {
    flex: none;
    width: 1.125rem;
    height: 1.125rem;
    margin: 0;
    cursor: pointer;
  }

  #todo-list li span {
    flex: 1;
    word-break: break-word;
  }

  #todo-list li span.done {
    text-decoration: line-through;
    color: #999;
  }

  #todo-list li button {
    flex: none;
    width: 1.75rem;
    height: 1.75rem;
    border: none;
    background: none;
    color: #999;
    font-size: 1rem;
    line-height: 1;
    cursor: pointer;
    border-radius: 50%;
  }

  #todo-list li button:hover {
    background: #f0f0f0;
    color: #111111;
  }
</style>
</head>
<body>
  <main>
    <h1>Work of J Sung Todo List</h1>
    <input id="todo-input" type="text" placeholder="할 일을 입력하고 Enter" autocomplete="off">
    <ul id="todo-list"></ul>
  </main>

  <script>
    const input = document.getElementById('todo-input');
    const list = document.getElementById('todo-list');

    function addItem(text) {
      const li = document.createElement('li');

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.setAttribute('aria-label', '완료 표시');

      const span = document.createElement('span');
      span.textContent = text;

      checkbox.addEventListener('change', () => {
        span.classList.toggle('done', checkbox.checked);
      });

      const removeBtn = document.createElement('button');
      removeBtn.textContent = '×';
      removeBtn.setAttribute('aria-label', '삭제');
      removeBtn.addEventListener('click', () => li.remove());

      li.appendChild(checkbox);
      li.appendChild(span);
      li.appendChild(removeBtn);
      list.insertBefore(li, list.firstChild);
    }

    input.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const text = input.value.trim();
      if (!text) return;
      addItem(text);
      input.value = '';
    });
  </script>
</body>
</html>
