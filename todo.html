<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>to-do list</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    color: #111111;
  }

  body {
    display: flex;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }

  main {
    width: 100%;
    max-width: 480px;
    padding: 3rem 1.5rem;
  }

  h1 {
    margin: 0 0 1.5rem;
    font-size: clamp(1.25rem, 4vw, 1.75rem);
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .tabs {
    display: flex;
    gap: 1.5rem;
    border-bottom: 1px solid #eee;
    margin-bottom: 1.5rem;
  }

  .tabs a {
    display: inline-block;
    padding: 0 0 0.75rem;
    font-size: 0.95rem;
    font-weight: 700;
    color: #999;
    text-decoration: none;
    border-bottom: 2px solid transparent;
  }

  .tabs a.active {
    color: #111111;
    border-bottom-color: #111111;
  }

  #todo-input {
    width: 100%;
    box-sizing: border-box;
    font-size: 1rem;
    padding: 0.75rem 1rem;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
  }

  #todo-input:focus {
    border-color: #111111;
  }

  #todo-list {
    list-style: none;
    margin: 1.5rem 0 0;
    padding: 0;
  }

  #todo-list li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
    padding: 0.75rem 0;
    border-bottom: 1px solid #eee;
  }

  #todo-list li input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    flex: none;
    width: 1.125rem;
    height: 1.125rem;
    margin: 0;
    cursor: pointer;
    border: 2px solid #ccc;
    border-radius: 50%;
    position: relative;
    outline: none;
  }

  #todo-list li input[type="checkbox"]:checked {
    background: #30b44a;
    border-color: #30b44a;
  }

  #todo-list li input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 42%;
    width: 0.3rem;
    height: 0.55rem;
    border: solid #ffffff;
    border-width: 0 2px 2px 0;
    transform: translate(-50%, -50%) rotate(45deg);
  }

  #todo-list li span {
    flex: 1;
    word-break: break-word;
  }

  #todo-list li span.done {
    text-decoration: line-through;
    color: #999;
  }

  #todo-list li.overdue {
    opacity: 0.45;
  }

  #todo-list li .todo-date {
    flex: none;
    font-size: 0.75rem;
    color: #999;
  }

  #todo-list li button {
    flex: none;
    width: 1.75rem;
    height: 1.75rem;
    border: none;
    background: none;
    color: #999;
    font-size: 1rem;
    line-height: 1;
    cursor: pointer;
    border-radius: 50%;
  }

  #todo-list li button:hover {
    background: #f0f0f0;
    color: #111111;
  }

  .date-modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    z-index: 1000;
  }

  .date-modal.hidden {
    display: none;
  }

  .date-modal-content {
    background: #ffffff;
    border-radius: 12px;
    width: 100%;
    max-width: 360px;
    padding: 1.5rem;
    box-sizing: border-box;
  }

  #date-modal-text {
    margin: 0 0 1rem;
    font-size: 0.95rem;
    font-weight: 700;
    word-break: break-word;
  }

  .mini-cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75rem;
  }

  .mini-cal-header button {
    border: none;
    background: none;
    font-size: 1.1rem;
    line-height: 1;
    padding: 0.4rem 0.6rem;
    cursor: pointer;
    border-radius: 6px;
    color: #111111;
  }

  .mini-cal-header button:hover {
    background: #f0f0f0;
  }

  #mini-cal-label {
    font-size: 0.9rem;
    font-weight: 700;
  }

  .mini-cal-weekdays,
  .mini-cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }

  .mini-cal-weekdays {
    margin-bottom: 0.25rem;
  }

  .mini-cal-weekdays div {
    text-align: center;
    font-size: 0.7rem;
    font-weight: 700;
    color: #999;
  }

  .mini-cal-grid div {
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    cursor: pointer;
    border-radius: 6px;
  }

  .mini-cal-grid div:hover {
    background: #f0f0f0;
  }

  .mini-cal-grid div.empty {
    cursor: default;
  }

  .mini-cal-grid div.empty:hover {
    background: none;
  }

  .mini-cal-grid div.today {
    background: #e5e5e5;
    font-weight: 700;
  }

  .mini-cal-grid div.selected {
    background: #111111;
    color: #ffffff;
  }

  .date-modal-actions {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-top: 1.25rem;
  }

  #date-modal-reset,
  #date-modal-skip {
    flex: 1;
    height: 3rem;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid #ccc;
    background: none;
    color: #111111;
    font-size: 0.9rem;
    font-weight: 700;
    padding: 0 1rem;
    border-radius: 9999px;
    cursor: pointer;
  }

  #date-modal-reset:hover,
  #date-modal-skip:hover {
    background: #f0f0f0;
  }

  #date-modal-confirm {
    flex: none;
    width: 3rem;
    height: 3rem;
    border: none;
    border-radius: 50%;
    font-size: 1.2rem;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #30b44a;
    color: #ffffff;
  }

  #date-modal-confirm:hover {
    background: #279e3f;
  }
</style>
</head>
<body>
  <main>
    <nav class="tabs">
      <a href="todo.html" class="active">to-do list</a>
      <a href="calendar.html">calendar</a>
    </nav>

    <h1>to-do list</h1>

    <input id="todo-input" type="text" placeholder="할 일을 입력하고 Enter" autocomplete="off">
    <ul id="todo-list"></ul>
  </main>

  <div class="date-modal hidden" id="date-modal">
    <div class="date-modal-content">
      <p id="date-modal-text"></p>

      <div class="mini-cal-header">
        <button id="mini-cal-prev" aria-label="이전 달">‹</button>
        <span id="mini-cal-label"></span>
        <button id="mini-cal-next" aria-label="다음 달">›</button>
      </div>

      <div class="mini-cal-weekdays">
        <div>SUN</div>
        <div>MON</div>
        <div>TUE</div>
        <div>WED</div>
        <div>THU</div>
        <div>FRI</div>
        <div>SAT</div>
      </div>

      <div class="mini-cal-grid" id="mini-cal-grid"></div>

      <div class="date-modal-actions">
        <button id="date-modal-reset">reset</button>
        <button id="date-modal-skip">skip</button>
        <button id="date-modal-confirm" aria-label="확인">✓</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="todos.js"></script>
  <script>
    const input = document.getElementById('todo-input');
    const list = document.getElementById('todo-list');

    const dateModal = document.getElementById('date-modal');
    const dateModalText = document.getElementById('date-modal-text');
    const dateModalReset = document.getElementById('date-modal-reset');
    const dateModalSkip = document.getElementById('date-modal-skip');
    const dateModalConfirm = document.getElementById('date-modal-confirm');
    const miniCalLabel = document.getElementById('mini-cal-label');
    const miniCalGrid = document.getElementById('mini-cal-grid');
    const miniCalPrev = document.getElementById('mini-cal-prev');
    const miniCalNext = document.getElementById('mini-cal-next');

    const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'];

    let pendingText = '';
    let pickerYear;
    let pickerMonth;
    let selectedDate = null;

    function todayString() {
      const d = new Date();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${d.getFullYear()}-${mm}-${dd}`;
    }

    function toDateString(year, month, day) {
      const mm = String(month + 1).padStart(2, '0');
      const dd = String(day).padStart(2, '0');
      return `${year}-${mm}-${dd}`;
    }

    function renderTodos(todos) {
      const today = todayString();
      const sorted = todos.slice().sort((a, b) => {
        if (a.date && b.date) return a.date < b.date ? -1 : a.date > b.date ? 1 : 0;
        if (a.date && !b.date) return -1;
        if (!a.date && b.date) return 1;
        return b.createdAt - a.createdAt;
      });
      list.innerHTML = '';

      sorted.forEach((todo) => {
        const li = document.createElement('li');
        if (todo.date && todo.date < today && !todo.done) {
          li.classList.add('overdue');
        }

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = todo.done;
        checkbox.setAttribute('aria-label', '완료 표시');
        checkbox.addEventListener('change', () => {
          updateTodo(todo.id, { done: checkbox.checked });
        });

        const span = document.createElement('span');
        span.textContent = todo.text;
        if (todo.done) span.classList.add('done');

        const removeBtn = document.createElement('button');
        removeBtn.textContent = '×';
        removeBtn.setAttribute('aria-label', '삭제');
        removeBtn.addEventListener('click', () => removeTodo(todo.id));

        li.appendChild(checkbox);
        li.appendChild(span);

        if (todo.date) {
          const dateTag = document.createElement('span');
          dateTag.className = 'todo-date';
          dateTag.textContent = todo.date;
          li.appendChild(dateTag);
        }

        li.appendChild(removeBtn);
        list.appendChild(li);
      });
    }

    function renderMiniCal() {
      miniCalLabel.textContent = `${monthNames[pickerMonth]} ${pickerYear}`;
      miniCalGrid.innerHTML = '';

      const today = todayString();
      const firstWeekday = new Date(pickerYear, pickerMonth, 1).getDay();
      const daysInMonth = new Date(pickerYear, pickerMonth + 1, 0).getDate();

      for (let i = 0; i < firstWeekday; i++) {
        const cell = document.createElement('div');
        cell.className = 'empty';
        miniCalGrid.appendChild(cell);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const cell = document.createElement('div');
        cell.textContent = day;
        const dateString = toDateString(pickerYear, pickerMonth, day);
        if (dateString === today) cell.classList.add('today');
        if (dateString === selectedDate) cell.classList.add('selected');
        cell.addEventListener('click', () => {
          selectedDate = dateString;
          renderMiniCal();
        });
        miniCalGrid.appendChild(cell);
      }
    }

    miniCalPrev.addEventListener('click', () => {
      pickerMonth -= 1;
      if (pickerMonth < 0) {
        pickerMonth = 11;
        pickerYear -= 1;
      }
      renderMiniCal();
    });

    miniCalNext.addEventListener('click', () => {
      pickerMonth += 1;
      if (pickerMonth > 11) {
        pickerMonth = 0;
        pickerYear += 1;
      }
      renderMiniCal();
    });

    function openDateModal() {
      dateModalText.textContent = `"${pendingText}"`;
      const now = new Date();
      pickerYear = now.getFullYear();
      pickerMonth = now.getMonth();
      selectedDate = null;
      renderMiniCal();
      dateModal.classList.remove('hidden');
    }

    function closeDateModal() {
      dateModal.classList.add('hidden');
      pendingText = '';
    }

    function finalizeAdd(dateValue) {
      addTodo(pendingText, dateValue || null);
      closeDateModal();
      input.focus();
    }

    input.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const text = input.value.trim();
      if (!text) return;
      pendingText = text;
      input.value = '';
      openDateModal();
    });

    dateModalReset.addEventListener('click', () => {
      const now = new Date();
      pickerYear = now.getFullYear();
      pickerMonth = now.getMonth();
      selectedDate = null;
      renderMiniCal();
    });
    dateModalSkip.addEventListener('click', () => finalizeAdd(null));
    dateModalConfirm.addEventListener('click', () => finalizeAdd(selectedDate));
    dateModal.addEventListener('click', (e) => {
      if (e.target === dateModal) closeDateModal();
    });

    subscribeTodos(renderTodos);
  </script>
</body>
</html>
